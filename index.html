<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Susana</title>
  <link rel="stylesheet" href="style.css">
  <!-- Auth check runs synchronously before body renders to avoid flash -->
  <script src="js/auth.js"></script>
</head>
<body>

  <!-- ── PIN Protection Overlay ─────────────────────────────── -->
  <div id="pin-overlay">
    <div id="pin-card">
      <p id="pin-title">Ingresá el código</p>
      <div id="pin-dots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div id="pin-keypad">
        <button class="pin-key" data-digit="1">1</button>
        <button class="pin-key" data-digit="2">2</button>
        <button class="pin-key" data-digit="3">3</button>
        <button class="pin-key" data-digit="4">4</button>
        <button class="pin-key" data-digit="5">5</button>
        <button class="pin-key" data-digit="6">6</button>
        <button class="pin-key" data-digit="7">7</button>
        <button class="pin-key" data-digit="8">8</button>
        <button class="pin-key" data-digit="9">9</button>
        <div class="pin-key-empty"></div>
        <button class="pin-key" data-digit="0">0</button>
        <button class="pin-key" id="pin-del">⌫</button>
      </div>
    </div>
  </div>

  <!-- ── Fotos ─────────────────────────────────────────── -->
  <div id="photo-container">
    <div id="photo-a" class="photo-layer"></div>
    <div id="photo-b" class="photo-layer"></div>
  </div>

  <!-- ── Reloj / Fecha ──────────────────────────────────── -->
  <div id="clock">
    <span id="clock-date">cargando…</span>
    <span id="clock-time"></span>
  </div>

  <!-- ── Widget de clima ────────────────────────────────── -->
  <div id="weather-widget" role="button" aria-label="Ver pronóstico del tiempo">
    <span id="weather-emoji">🌡️</span>
    <span id="weather-temp">--°</span>
    <span id="weather-desc">cargando</span>
  </div>

  <!-- ── Barra de noticias ───────────────────────────────── -->
  <div id="news-bar" role="button" aria-label="Ver noticia completa">
    <span id="news-label">Hoy</span>
    <span id="news-text">Cargando noticias…</span>
  </div>

  <!-- ── Overlay (clima detalle / noticia) ──────────────── -->
  <div id="overlay" role="dialog" aria-modal="true">
    <div id="overlay-card">
      <button id="overlay-close" aria-label="Cerrar">✕</button>
      <div id="overlay-body"></div>
    </div>
  </div>

  <!-- ── Lector de noticias ──────────────────────────────── -->
  <div id="reader-overlay" role="dialog" aria-modal="true">
    <div id="reader-card">
      <div id="reader-header">
        <button id="reader-close" aria-label="Cerrar">✕</button>
      </div>
      <div id="reader-scroll">
        <div id="reader-body"></div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/weather-codes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
